[package]
name = "ruwasm"
version = "0.1.0"
edition = "2024"

[dependencies]
async-channel = "2.5.0"
console_error_panic_hook = "0.1.7"
futures = "0.3.32"
futures-channel = "0.3.32"
rustradio = { version = "0.16.1", features = ["wasm"] }
rustradio_macros = "0.16.0"
#rustradio = { path = "../rustradio", features = ["wasm"] }
#rustradio = { git = "https://github.com/ThomasHabets/rustradio", branch = "wasm", features = ["wasm"] }
serde = { version = "1.0.219", features = ["derive"] }
serde-wasm-bindgen = "0.6.5"
serde_json = "1.0.140"
wasm-bindgen = "0.2.100"
wasm-bindgen-futures = "0.4.64"

[dependencies.web-sys]
version = "0.3"
features = [
    "Window",
    "WorkerGlobalScope",
    "Document",
    "HtmlInputElement",
    "HtmlButtonElement",
    "File",
    "FileList",
    "Blob",
    "FileReader",
    "Event",
    "DedicatedWorkerGlobalScope",
    "Worker",
    "WorkerOptions",
    "WorkerType",
    "MessageEvent",
    "ProgressEvent",
    "console",
]
[lib]
crate-type = ["cdylib"]  # <-- THIS IS CRITICAL
[profile.release]
debug = true
