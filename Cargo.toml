[package]
name = "ruwasm"
version = "0.1.0"
edition = "2024"

[dependencies]
#rustradio = "0.14.2"
rustradio = { path = "../rustradio", features = ["wasm"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
wasm-bindgen = "0.2.100"
[lib]
crate-type = ["cdylib"]  # <-- THIS IS CRITICAL
[profile.release]
debug = true
