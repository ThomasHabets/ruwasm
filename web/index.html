<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Minimal Rust WASM</title>
</head>
<body>
    <h1>Rust WASM Add Example</h1>
    <button onclick="callAdd()">Add 5 + 3</button>
    <button onclick="callRadio()">rustradio</button>
    <button onclick="startCompute()">Compute</button>
    <input type="file" id="fileInput" />
    <p id="result"></p>
    <p id="output"></p>

    <!-- run worker  -->
    <script>
            const worker = new Worker("worker.js", {type: "module"});

        worker.onmessage = (e) => {
            if (e.data.type === "ready") {
                console.log("WASM loaded in worker");
            } else if (e.data.type === "result") {
                    console.log("Got from worker: " + e.data.data);
                document.getElementById("output").textContent =
                    "Result: " + e.data.data;
                    console.log("bleh: " + e.data.data.toString());
            } else {
                    console.log("Unknown message from worker");
            }
        };

        worker.postMessage({ type: "init" });

        function startCompute() {
            console.log("Sending compute message");
            worker.postMessage({ type: "compute", data: 1000000 });
        }
    </script>

    <!-- run synchronous -->
    <script type="module">
            import init, { add, radio } from "./ruwasm.js";
                await init();
                console.log("WASM initialized");
                async function callAdd() {
                    //await init();
                    document.getElementById("result").textContent = add(3,5);
                }
                async function callRadio() {
                        try {
                            document.getElementById("result").textContent = radio();
                        } catch (e) {
                            console.error("WASM trap:", e);
                            console.error(e.stack);
                        }
                }
                window.callAdd = callAdd;
                window.callRadio = callRadio;

                // File uploader.
                fileInput.addEventListener('change', async ev => {
                    const file = ev.target.files?.[0];   // File extends Blob
                    if (!file) return;

                    console.log(`name: ${file.name}, size: ${file.size} bytes, type: ${file.type}`);

                    // -------- Or convert to raw bytes --------
                    const buf  = await file.arrayBuffer();       // ArrayBuffer
                    const data = new Uint8Array(buf);            // Uint8Array view
                    console.log('first 16 bytes:', data.slice(0, 16));
                        try {
                            document.getElementById("result").textContent = radio(data);
                        } catch (e) {
                            console.error("WASM trap:", e);
                            console.error(e.stack);
                        }
                });
    </script>
</body>
</html>
