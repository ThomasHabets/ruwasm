<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Minimal Rust WASM</title>
</head>
<body>
    <h1>Rust WASM Add Example</h1>
    <button onclick="callAdd()">Add 5 + 3</button>
    <p id="result"></p>

    <script>
        let wasm;

        async function loadWasm() {
            const response = await fetch('add.wasm');
            const buffer = await response.arrayBuffer();
            const { instance } = await WebAssembly.instantiate(buffer);
            wasm = instance.exports;
        }

        function callAdd() {
            const result = wasm.add(5, 3);
                console.log(result);
                const ptr = Number(result >> 32n);
                const len = Number(result & 0xFFFFFFFFn);

                const mem = new Uint8Array(wasm.memory.buffer);
                const bytes = mem.slice(ptr, ptr + len);
                const s = new TextDecoder("utf-8").decode(bytes);

            document.getElementById("result").textContent = `Result: ${s}`;
                const data = JSON.parse(s);
                wasm.free_string(ptr, len);
                eval(data.eval);
        }

        loadWasm();
    </script>
</body>
</html>
